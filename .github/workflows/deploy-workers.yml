name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Apply D1 migrations before deploy
        type: boolean
        required: true
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build assets
        run: npm run build:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Sync ADMIN_TOKEN
        if: ${{ secrets.ADMIN_TOKEN != '' }}
        run: printf "%s" "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync ADMIN_LOGIN_USERNAME
        if: ${{ secrets.ADMIN_LOGIN_USERNAME != '' }}
        run: printf "%s" "$ADMIN_LOGIN_USERNAME" | npx wrangler secret put ADMIN_LOGIN_USERNAME
        env:
          ADMIN_LOGIN_USERNAME: ${{ secrets.ADMIN_LOGIN_USERNAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync ADMIN_LOGIN_PASSWORD
        if: ${{ secrets.ADMIN_LOGIN_PASSWORD != '' }}
        run: printf "%s" "$ADMIN_LOGIN_PASSWORD" | npx wrangler secret put ADMIN_LOGIN_PASSWORD
        env:
          ADMIN_LOGIN_PASSWORD: ${{ secrets.ADMIN_LOGIN_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: D1 migrations (remote)
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
