<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>博客后台</title>
    <script>
      (function () {
        var storageKey = "neonlab.theme";
        try {
          var saved = localStorage.getItem(storageKey);
          if (saved === "light" || saved === "dark") {
            document.documentElement.dataset.theme = saved;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            document.documentElement.dataset.theme = "light";
          } else {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <canvas id="stars-canvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <div class="bg" aria-hidden="true"></div>

    <main class="container content">
      <header class="page-head">
        <p class="badge">ADMIN CONSOLE</p>
        <div class="admin-page-head">
          <div>
            <h1 class="page-title">博客后台</h1>
            <p class="page-desc">在一个页面里管理文章、个人资料、导航和 AI 工具。</p>
          </div>
          <div class="admin-head-actions">
            <a class="btn ghost" href="/" target="_blank" rel="noopener noreferrer">查看前台</a>
            <button id="refreshButton" class="btn ghost" type="button">刷新数据</button>
            <button id="logoutButton" class="btn admin-danger" type="button">退出登录</button>
          </div>
        </div>
      </header>

      <section class="glass panel admin-auth-panel">
        <p id="adminStatus" class="admin-status">正在同步后台数据...</p>
      </section>

      <div class="admin-posts-layout">
        <nav class="admin-sidebar glass panel admin-panel">
          <div class="admin-panel-head">
            <div>
              <h2 class="admin-panel-title">控制台</h2>
              <p class="admin-panel-desc">切换不同管理页面。</p>
            </div>
          </div>
          <div id="pageNav" class="admin-post-list">
            <button class="admin-post-item is-active" data-page-target="overview" type="button">
              <span class="admin-post-item-title">概览</span>
              <span class="admin-post-item-meta">当前状态</span>
            </button>
            <button class="admin-post-item" data-page-target="posts" type="button">
              <span class="admin-post-item-title">文章</span>
              <span class="admin-post-item-meta">创建与修改</span>
            </button>
            <button class="admin-post-item" data-page-target="nav" type="button">
              <span class="admin-post-item-title">导航</span>
              <span class="admin-post-item-meta">前台入口</span>
            </button>
            <button class="admin-post-item" data-page-target="ai-tools" type="button">
              <span class="admin-post-item-title">AI工具</span>
              <span class="admin-post-item-meta">卡片管理</span>
            </button>
            <button class="admin-post-item" data-page-target="profile" type="button">
              <span class="admin-post-item-title">个人资料</span>
              <span class="admin-post-item-meta">作者信息</span>
            </button>
            <button class="admin-post-item" data-page-target="settings" type="button">
              <span class="admin-post-item-title">站点设置</span>
              <span class="admin-post-item-meta">标题与简介</span>
            </button>
          </div>
        </nav>

        <div id="adminPages">
          <div class="admin-page admin-page--active" data-page="overview">
            <section class="glass panel admin-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">概览</h2>
                  <p class="admin-panel-desc">快速查看当前博客的主要内容状态。</p>
                </div>
              </div>
              <div id="overviewStats" class="admin-nav-list"></div>
            </section>
          </div>

          <div class="admin-page" data-page="posts">
            <section class="glass panel admin-panel admin-posts-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">文章管理</h2>
                  <p class="admin-panel-desc">新建、编辑、删除博客文章。</p>
                </div>
                <button id="newPostButton" class="btn primary" type="button">新建文章</button>
              </div>

              <div class="admin-posts-layout">
                <aside class="admin-posts-sidebar">
                  <div id="postList" class="admin-post-list"></div>
                </aside>

                <section class="admin-post-editor">
                  <form id="postForm" class="admin-form">
                    <div class="admin-two-col">
                      <label class="admin-field">
                        <span class="admin-label">标题</span>
                        <input id="postTitle" type="text" maxlength="120" />
                      </label>
                      <label class="admin-field">
                        <span class="admin-label">Slug</span>
                        <input id="postSlug" type="text" maxlength="160" />
                      </label>
                    </div>

                    <label class="admin-field">
                      <span class="admin-label">摘要</span>
                      <textarea id="postExcerpt" rows="3"></textarea>
                    </label>

                    <div class="admin-two-col">
                      <label class="admin-field">
                        <span class="admin-label">标签（逗号分隔）</span>
                        <input id="postTags" type="text" placeholder="Cloudflare, Workers, Blog" />
                      </label>
                      <label class="admin-field">
                        <span class="admin-label">封面图 URL</span>
                        <input id="postCoverUrl" type="url" placeholder="https://example.com/cover.png" />
                      </label>
                    </div>

                    <label class="admin-field">
                      <span class="admin-label">Markdown 正文</span>
                      <textarea id="postContent" rows="18"></textarea>
                    </label>

                    <div class="admin-inline-actions">
                      <button class="btn primary" type="submit">保存文章</button>
                      <button id="previewPostButton" class="btn ghost" type="button">预览文章</button>
                      <button id="deletePostButton" class="btn admin-danger" type="button">删除文章</button>
                    </div>
                  </form>
                </section>
              </div>
            </section>
          </div>

          <div class="admin-page" data-page="nav">
            <section class="glass panel admin-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">导航管理</h2>
                  <p class="admin-panel-desc">管理前台导航栏里的内容和顺序。</p>
                </div>
                <button id="addNavButton" class="btn ghost" type="button">新增导航</button>
              </div>
              <div id="navList" class="admin-nav-list"></div>
            </section>
          </div>

          <div class="admin-page" data-page="ai-tools">
            <section class="glass panel admin-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">AI 工具管理</h2>
                  <p class="admin-panel-desc">维护 AI 工具页里的卡片内容。</p>
                </div>
                <button id="addAiButton" class="btn ghost" type="button">新增工具</button>
              </div>
              <div id="aiList" class="admin-ai-list"></div>
            </section>
          </div>

          <div class="admin-page" data-page="profile">
            <section class="glass panel admin-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">个人资料</h2>
                  <p class="admin-panel-desc">修改作者信息和个人介绍页内容。</p>
                </div>
                <button id="addSocialLinkButton" class="btn ghost" type="button">新增社交链接</button>
              </div>
              <form id="profileForm" class="admin-form">
                <div class="admin-two-col">
                  <label class="admin-field">
                    <span class="admin-label">作者名</span>
                    <input id="authorName" type="text" maxlength="80" />
                  </label>
                  <label class="admin-field">
                    <span class="admin-label">一句话 slogan</span>
                    <input id="slogan" type="text" maxlength="120" />
                  </label>
                </div>

                <div class="admin-two-col">
                  <label class="admin-field">
                    <span class="admin-label">GitHub 链接</span>
                    <input id="githubUrl" type="url" placeholder="https://github.com/..." />
                  </label>
                  <label class="admin-field">
                    <span class="admin-label">邮箱</span>
                    <input id="email" type="email" placeholder="name@example.com" />
                  </label>
                </div>

                <label class="admin-field">
                  <span class="admin-label">个人资料（支持 Markdown）</span>
                  <textarea id="profileBio" rows="8"></textarea>
                </label>

                <div id="socialLinksList" class="admin-nav-list"></div>

                <div class="admin-inline-actions">
                  <button class="btn primary" type="submit">保存个人资料</button>
                </div>
              </form>
            </section>
          </div>

          <div class="admin-page" data-page="settings">
            <section class="glass panel admin-panel">
              <div class="admin-panel-head">
                <div>
                  <h2 class="admin-panel-title">站点设置</h2>
                  <p class="admin-panel-desc">修改博客标题和首页简介。</p>
                </div>
              </div>
              <form id="siteConfigForm" class="admin-form">
                <label class="admin-field">
                  <span class="admin-label">博客标题</span>
                  <input id="blogTitle" type="text" maxlength="120" />
                </label>
                <label class="admin-field">
                  <span class="admin-label">博客简介</span>
                  <textarea id="blogDescription" rows="3"></textarea>
                </label>
                <div class="admin-inline-actions">
                  <button class="btn primary" type="submit">保存站点设置</button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </div>
    </main>

    <button class="back-to-top" aria-label="返回顶部">↑</button>
    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-close" aria-label="关闭">×</button>
      <img src="" alt="" />
    </div>

    <script src="/assets/js/sw-register.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="/assets/js/admin.js" defer></script>
  </body>
</html>
