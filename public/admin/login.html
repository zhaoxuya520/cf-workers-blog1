<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>后台登录</title>
    <script>
      (function () {
        var storageKey = "neonlab.theme";
        try {
          var saved = localStorage.getItem(storageKey);
          if (saved === "light" || saved === "dark") {
            document.documentElement.dataset.theme = saved;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            document.documentElement.dataset.theme = "light";
          } else {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <canvas id="stars-canvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <div class="bg" aria-hidden="true"></div>

    <main class="container content admin-login-shell">
      <section class="admin-login-layout">
        <article class="glass panel admin-login-story">
          <p class="badge">主场开启</p>
          <h1 class="title admin-login-title">回到我的控制台</h1>
          <p class="lead">
            这里管内容，也管这个博客的样子。
          </p>
          <div class="admin-login-glow"></div>
          <div class="admin-login-metrics">
            <div class="admin-login-metric">
              <span class="admin-login-metric-value">文章主理</span>
              <span class="admin-login-metric-label">每篇内容都在这里</span>
            </div>
            <div class="admin-login-metric">
              <span class="admin-login-metric-value">作者名片</span>
              <span class="admin-login-metric-label">把自己的介绍立住</span>
            </div>
            <div class="admin-login-metric">
              <span class="admin-login-metric-value">页面动线</span>
              <span class="admin-login-metric-label">入口顺序由你决定</span>
            </div>
          </div>
        </article>

        <article class="glass panel admin-login-card">
          <div class="admin-login-card-head">
            <p class="badge">进入主场</p>
            <h2 class="admin-panel-title">入场</h2>
            <p class="admin-panel-desc">确认身份后，继续管理你的博客。</p>
          </div>

          <form id="loginForm" class="admin-form admin-login-form">
            <label class="admin-field">
              <span class="admin-label">用户名</span>
              <input id="loginUsername" type="text" autocomplete="username" placeholder="输入用户名" />
            </label>
            <label class="admin-field">
              <span class="admin-label">登录密码</span>
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="输入登录密码" />
            </label>
            <button class="btn primary admin-login-submit" type="submit">进入</button>
          </form>

          <p id="loginStatus" class="admin-status">输入账号后，回到你的主场。</p>

          <div class="admin-login-footer">
            <a class="btn ghost" href="/">回到首页</a>
          </div>
        </article>
      </section>
    </main>

    <button class="back-to-top" aria-label="返回顶部">↑</button>
    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-close" aria-label="关闭">×</button>
      <img src="" alt="" />
    </div>

    <script src="/assets/js/sw-register.js" defer></script>
    <script src="/assets/js/main.js" defer></script>
    <script src="/assets/js/admin-login.js" defer></script>
  </body>
</html>
